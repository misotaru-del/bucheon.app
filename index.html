<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부천시 AI바로가기</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            position: relative; 
        }
        .bg-img { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            object-fit: contain; 
            object-position: center; 
            opacity: 0.5; 
            z-index: -1; 
            pointer-events: none; 
        }
        .logo-img { 
            position: absolute; 
            top: 30px; 
            left: 40px; 
            height: 60px; 
            width: auto; 
            z-index: 10; 
        }
        h1 { 
            color: #2c3e50; 
            margin-bottom: 20px; 
            font-size: 34px; 
            font-weight: 900; 
            text-shadow: 2px 2px 4px rgba(255,255,255,0.9); 
            z-index: 1; 
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            width: 90%; 
            max-width: 1000px; 
            z-index: 1; 
            max-height: 60vh; 
            overflow-y: auto; 
            padding: 10px; 
        }
        
        button { 
            background-color: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(5px); 
            border: 2px solid rgba(224, 228, 232, 0.8); 
            border-radius: 16px; 
            padding: 25px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        button:hover { 
            background-color: rgba(255, 255, 255, 0.98); 
            border-color: #4285F4; 
            transform: translateY(-3px); 
            box-shadow: 0 8px 15px rgba(66, 133, 244, 0.2); 
        }
        
        .btn-title { 
            font-size: 22px; 
            font-weight: bold; 
            color: #34495e; 
            margin-bottom: 12px; 
            transition: color 0.2s; 
        }
        button:hover .btn-title { color: #4285F4; }
        .btn-date { 
            font-size: 13px; 
            color: #7f8c8d; 
            background-color: rgba(241, 242, 246, 0.9); 
            padding: 4px 12px; 
            border-radius: 20px; 
        }
        
        .category-btn { 
            border-color: #a0c3ff; 
            background-color: rgba(240, 248, 255, 0.85); 
        }
        .category-btn .btn-title { 
            font-size: 24px; 
            color: #2980b9; 
            margin-bottom: 5px; 
        }
        .category-desc { 
            font-size: 14px; 
            color: #555; 
            font-weight: bold; 
        }

        .back-container { 
            width: 90%; 
            max-width: 1000px; 
            text-align: left; 
            margin-bottom: 15px; 
            z-index: 1; 
            display: none; 
        }
        .back-btn { 
            background-color: #e74c3c; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            display: inline-block; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            flex-direction: row; 
            width: auto; 
            transition: background 0.2s; 
        }
        .back-btn:hover { 
            background-color: #c0392b; 
            transform: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            border-color: transparent; 
        }
        .back-btn .btn-title { 
            color: white; 
            font-size: 16px; 
            margin: 0; 
        }

        .footer-info { 
            position: fixed; 
            bottom: 15px; 
            right: 30px; 
            font-size: 14px; 
            font-weight: bold; 
            color: #7f8c8d; 
            z-index: 10; 
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8); 
        }
    </style>
</head>
<body>
    <img class="bg-img" src="2.png" onerror="this.style.display='none'" alt="배경 이미지">
    <img class="logo-img" src="1.png" onerror="this.style.display='none'" alt="로고 이미지">
    
    <div class="footer-info">📞 문의 및 개선: 총무팀(2233)</div>
    
    <h1 id="main-title">📚 부천시 AI바로가기</h1>
    
    <div class="back-container" id="back-container">
        <button class="back-btn" onclick="showCategories()">🔙 이전 화면으로</button>
    </div>

    <div class="grid" id="content-grid"></div>

    <script>
        const APP_TITLE = "부천시 AI바로가기";
        
        // 메뉴 데이터
        const menuData = {
            "📁 복무바로": [
                {"title": "공무원", "url": "https://notebooklm.google.com/notebook/98373193-690b-4cc1-aaec-b67a89ddb76d", "date": "2026.03.12."},
                {"title": "공무직", "url": "https://notebooklm.google.com/notebook/6d21b8cf-d673-4b9c-8043-fdc62e5e76d1", "date": "2026.03.12."},
                {"title": "기간제", "url": "https://notebooklm.google.com/notebook/4410b39f-b082-45c9-826c-3cb6115ae139", "date": "2026.03.12."}
            ],
            "선거바로": [
                {"title": "선거바로", "url": "https://notebooklm.google.com/notebook/c57f562f-e822-4c61-90c8-d94a32814352", "date": "2026.03.20."}
            ],
            "직원복지바로": [
                {"title": "직원복지바로", "url": "https://notebooklm.google.com/notebook/7d78ae98-f672-4f5a-8a33-1ff8f3716e6e/preview", "date": "2026.03.20."}
            ],
            "제증명바로": [
                {"title": "제증명바로", "url": "https://notebooklm.google.com/notebook/c9884323-f942-4218-b687-015f82d59f34", "date": "2026.03.20."}
            ],
            "📁 전산바로": [
                {"title": "새올", "url": "https://notebooklm.google.com/notebook/8f378237-cff4-4ff9-b36a-60b3c5c4ba39/preview", "date": "2026.03.12."},
                {"title": "온나라", "url": "https://notebooklm.google.com/notebook/0756540b-9392-46da-8126-a101af32ca97/preview", "date": "2026.03.12."},
                {"title": "B드라이브", "url": "https://notebooklm.google.com/notebook/ba3ee8f7-7a61-4a7f-98fe-1112731b3923/preview", "date": "2026.03.12."},
                {"title": "행정전자서명(GPKI)", "url": "https://notebooklm.google.com/notebook/bab39344-6eea-467f-b643-440e6214fa3f/preview", "date": "2026.03.12."},
                {"title": "홈페이지관리", "url": "https://notebooklm.google.com/notebook/4b7414c9-6c90-41d1-964d-fd3cdae9d8e3/preview", "date": "2026.03.12."},
                {"title": "모바일행정전화(APP)", "url": "https://notebooklm.google.com/notebook/ee88efc9-d5b8-4918-90f3-9c3464d3d012/preview", "date": "2026.03.12."},
                {"title": "업무용전화기", "url": "https://notebooklm.google.com/notebook/80b5a4e7-53ba-42d5-8710-e6f4bb7cb188/preview", "date": "2026.03.12."},
                {"title": "웹팩스", "url": "https://notebooklm.google.com/notebook/a1c07c28-60ca-4833-b427-8e0e32a9c8ae/preview", "date": "2026.03.12."},
                {"title": "복합기장애조치", "url": "https://notebooklm.google.com/notebook/06ce2487-33e8-4d81-9309-b25d50f13ba8/preview", "date": "2026.03.12."}
            ]
        };

        const grid = document.getElementById('content-grid');
        const backContainer = document.getElementById('back-container');
        const mainTitle = document.getElementById('main-title');

        function showCategories() {
            grid.innerHTML = '';
            backContainer.style.display = 'none';
            mainTitle.innerHTML = `📚 ${APP_TITLE}`;

            for (const category in menuData) {
                const items = menuData[category];
                const itemCount = items.length;
                const btn = document.createElement('button');
                
                if (itemCount === 1) {
                    const singleItem = items[0];
                    // 🚨 핵심 수정: 새 창(_blank)에서 열리도록 변경
                    btn.onclick = () => window.open(singleItem.url, '_blank');
                    btn.innerHTML = `
                        <span class="btn-title">${singleItem.title}</span>
                        <span class="btn-date">갱신일: ${singleItem.date}</span>
                    `;
                } else {
                    btn.className = 'category-btn';
                    btn.onclick = () => showItems(category);
                    btn.innerHTML = `
                        <span class="btn-title">${category}</span>
                        <span class="category-desc">총 ${itemCount}개의 AI</span>
                    `;
                }
                grid.appendChild(btn);
            }
        }

        function showItems(category) {
            grid.innerHTML = '';
            backContainer.style.display = 'block';
            mainTitle.innerHTML = `📂 ${category}`;

            const items = menuData[category];
            items.forEach(item => {
                const btn = document.createElement('button');
                // 🚨 핵심 수정: 새 창(_blank)에서 열리도록 변경
                btn.onclick = () => window.open(item.url, '_blank');
                btn.innerHTML = `
                    <span class="btn-title">${item.title}</span>
                    <span class="btn-date">갱신일: ${item.date}</span>
                `;
                grid.appendChild(btn);
            });
        }

        // 초기 카테고리 로드
        showCategories();
    </script>
</body>
</html>
