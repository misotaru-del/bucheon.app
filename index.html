<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부천시 AI바로가기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; position: relative; }
        
        /* 배경 및 로고 (이제 복잡한 변환 없이 이미지 파일 이름을 직접 씁니다) */
        .bg-img { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; object-position: center; opacity: 0.5; z-index: -1; pointer-events: none; }
        .logo-img { position: absolute; top: 30px; left: 40px; height: 60px; width: auto; z-index: 10; }
        
        h1 { color: #2c3e50; margin-bottom: 40px; font-size: 34px; font-weight: 900; text-shadow: 2px 2px 4px rgba(255,255,255,0.9); z-index: 1; text-align: center; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; width: 90%; max-width: 1000px; z-index: 1; 
            max-height: 70vh; overflow-y: auto; padding: 10px;
        }
        
        button { background-color: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px); border: 2px solid rgba(224, 228, 232, 0.8); border-radius: 16px; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button:hover { background-color: rgba(255, 255, 255, 0.95); border-color: #4285F4; transform: translateY(-3px); box-shadow: 0 8px 15px rgba(66, 133, 244, 0.2); }
        .btn-title { font-size: 22px; font-weight: bold; color: #34495e; margin-bottom: 12px; transition: color 0.2s; }
        button:hover .btn-title { color: #4285F4; }
        .btn-date { font-size: 13px; color: #7f8c8d; font-weight: normal; background-color: rgba(241, 242, 246, 0.9); padding: 4px 12px; border-radius: 20px; }
        
        .footer-info { position: fixed; bottom: 15px; right: 30px; font-size: 14px; font-weight: bold; color: #7f8c8d; z-index: 10; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <img class="bg-img" src="2.png" onerror="this.style.display='none'" alt="배경 핸썹이">
    <img class="logo-img" src="1.png" onerror="this.style.display='none'" alt="부천시 로고">
    
    <div class="footer-info">📞 문의 및 개선: 총무팀(2233)</div>
    <h1>📚 부천시 AI바로가기</h1>
    
    <div class="grid">
        <button onclick="window.open('https://notebooklm.google.com/notebook/52f772f7-a394-41b3-9c84-4321c23c566e?pli=1&addSource=true', '_blank')">
            <span class="btn-title">청렴바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="window.open('https://notebooklm.google.com/notebook/a4ea5634-e134-4bca-91cd-d772ea75a1d1', '_blank')">
            <span class="btn-title">연금바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="window.open('https://notebooklm.google.com/notebook/c28b89cc-8222-42a7-b0ff-d084b061baf4?pli=1', '_blank')">
            <span class="btn-title">지적바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="window.open('https://notebooklm.google.com/notebook/98373193-690b-4cc1-aaec-b67a89ddb76d', '_blank')">
            <span class="btn-title">복무바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="window.open('https://notebooklm.google.com/notebook/e68a8b1e-9fc9-4ce8-976f-8732dd2cc99c?authuser=0&addSource=true', '_blank')">
            <span class="btn-title">선거바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
    </div>
</body>
</html>
