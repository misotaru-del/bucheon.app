<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부천시 AI바로가기</title>
    <style>
        /* 🚨 화면 전체를 꽉 채우고 가로로 배치(flex)합니다 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* --- 왼쪽 메뉴바 (사이드바) 디자인 --- */
        .sidebar { 
            width: 320px; 
            background: rgba(255, 255, 255, 0.95); 
            box-shadow: 2px 0 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            z-index: 10;
            overflow-y: auto;
        }
        
        .sidebar-header { text-align: center; margin-bottom: 30px; }
        .sidebar-header h1 { color: #2c3e50; font-size: 24px; font-weight: 900; margin: 10px 0 0 0; }
        .logo-img { height: 50px; width: auto; }
        
        /* 버튼 디자인 */
        button { background-color: #ffffff; border: 2px solid #e0e4e8; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; flex-direction: column; align-items: flex-start; cursor: pointer; transition: all 0.2s ease; width: 100%; text-align: left; }
        button:hover { background-color: #f8faff; border-color: #4285F4; transform: translateX(5px); box-shadow: 0 4px 10px rgba(66, 133, 244, 0.1); }
        .btn-title { font-size: 18px; font-weight: bold; color: #34495e; margin-bottom: 5px; transition: color 0.2s; }
        button:hover .btn-title { color: #4285F4; }
        .btn-date { font-size: 12px; color: #7f8c8d; }
        
        .footer-info { margin-top: auto; padding-top: 20px; font-size: 13px; font-weight: bold; color: #95a5a6; text-align: center; border-top: 1px solid #ecf0f1; }

        /* --- 오른쪽 메인 채팅창 디자인 --- */
        .main-content { 
            flex: 1; /* 남은 공간을 모두 차지함 */
            position: relative;
            background-color: #e9ecef;
        }
        
        /* 아이프레임(다른 사이트를 불러오는 창) 설정 */
        iframe { width: 100%; height: 100%; border: none; }
        
        /* 초기 안내 문구 */
        .placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #7f8c8d; }
        .placeholder img { width: 150px; opacity: 0.5; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img class="logo-img" src="1.png" onerror="this.style.display='none'" alt="부천시 로고">
            <h1>📚 AI바로가기</h1>
        </div>
        
        <button onclick="changeChat('https://notebooklm.google.com/notebook/52f772f7-a394-41b3-9c84-4321c23c566e?pli=1&addSource=true')">
            <span class="btn-title">청렴바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="changeChat('https://notebooklm.google.com/notebook/a4ea5634-e134-4bca-91cd-d772ea75a1d1')">
            <span class="btn-title">연금바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="changeChat('https://notebooklm.google.com/notebook/c28b89cc-8222-42a7-b0ff-d084b061baf4?pli=1')">
            <span class="btn-title">지적바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="changeChat('https://notebooklm.google.com/notebook/98373193-690b-4cc1-aaec-b67a89ddb76d')">
            <span class="btn-title">복무바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>
        <button onclick="changeChat('https://notebooklm.google.com/notebook/e68a8b1e-9fc9-4ce8-976f-8732dd2cc99c?authuser=0&addSource=true')">
            <span class="btn-title">선거바로</span><span class="btn-date">갱신일: 2026.03.12.</span>
        </button>

        <div class="footer-info">📞 문의 및 개선: 총무팀(2233)</div>
    </div>

    <div class="main-content">
        <div class="placeholder" id="welcome-msg">
            <img src="2.png" onerror="this.style.display='none'" alt="핸썹이">
            <h2>왼쪽에서 원하는 AI를 선택해주세요!</h2>
            <p>※ 구글 보안 정책으로 인해 화면이 표시되지 않을 경우,<br>오른쪽 아래 '새 창에서 열기' 버튼을 이용해주세요.</p>
        </div>
        
        <iframe id="chat-frame" src=""></iframe>
        
        <button id="external-link-btn" style="display:none; position:absolute; bottom:30px; right:30px; width:auto; background:#4285F4; color:white; border-radius:50px; padding:15px 25px; box-shadow:0 4px 10px rgba(0,0,0,0.2);" onclick="openExternal()">
            <span class="btn-title" style="color:white; margin:0; font-size:16px;">🚀 새 창에서 크게 열기</span>
        </button>
    </div>

    <script>
        let currentUrl = "";

        function changeChat(url) {
            currentUrl = url;
            // 1. 환영 문구 숨기기
            document.getElementById('welcome-msg').style.display = 'none';
            
            // 2. iframe에 구글 주소 넣기 (구글이 막을 확률이 높음)
            document.getElementById('chat-frame').src = url;
            
            // 3. 비상용 '새 창 열기' 버튼 보여주기
            document.getElementById('external-link-btn').style.display = 'block';
        }

        function openExternal() {
            if(currentUrl !== "") {
                window.open(currentUrl, '_blank');
            }
        }
    </script>
</body>
</html>
